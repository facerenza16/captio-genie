<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Captio Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div class="popup">

    <header class="popup-header">
      <svg class="wordmark" viewBox="0 0 320 52" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Captio Genie">
        <defs><clipPath id="wmclip"><circle cx="24" cy="25" r="11"/></clipPath></defs>
        <rect y="2" width="48" height="48" rx="10" fill="#FFFFFF" stroke="#E8E8E8" stroke-width=".5"/>
        <circle cx="24" cy="25" r="11" stroke="#1A1A1A" stroke-width="1.8" fill="none"/>
        <line x1="13" y1="21" x2="35" y2="21" stroke="#1A1A1A" stroke-width="1.2" clip-path="url(#wmclip)" stroke-opacity=".5"/>
        <line x1="13" y1="25" x2="35" y2="25" stroke="#1A1A1A" stroke-width="1.2" clip-path="url(#wmclip)"/>
        <line x1="13" y1="29" x2="35" y2="29" stroke="#1A1A1A" stroke-width="1.2" clip-path="url(#wmclip)" stroke-opacity=".5"/>
        <line x1="20" y1="14" x2="20" y2="36" stroke="#1A1A1A" stroke-width="1.2" clip-path="url(#wmclip)" stroke-opacity=".5"/>
        <line x1="24" y1="14" x2="24" y2="36" stroke="#1A1A1A" stroke-width="1.2" clip-path="url(#wmclip)"/>
        <line x1="28" y1="14" x2="28" y2="36" stroke="#1A1A1A" stroke-width="1.2" clip-path="url(#wmclip)" stroke-opacity=".5"/>
        <path d="M 19 35 Q 24 41 29 35" stroke="#1A1A1A" stroke-width="1.6" fill="none" stroke-linecap="round"/>
        <line x1="24" y1="40.5" x2="24" y2="43.5" stroke="#1A1A1A" stroke-width="1.6" stroke-linecap="round"/>
        <circle cx="37" cy="11" r="1.2" fill="#888888"/>
        <line x1="37" y1="7" x2="37" y2="9.5" stroke="#888888" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="33" y1="11" x2="35.5" y2="11" stroke="#888888" stroke-width="1.2" stroke-linecap="round"/>
        <text x="62" y="25" font-family="'Plus Jakarta Sans', Helvetica, sans-serif" font-size="20" font-weight="800" letter-spacing="-0.4" fill="#1A1A1A">Captio <tspan font-weight="300">Genie</tspan></text>
        <text x="63" y="40" font-family="'Plus Jakarta Sans', Helvetica, sans-serif" font-size="10" font-weight="500" letter-spacing="1.2" fill="#888888">CAPTURA TUS DATOS</text>
      </svg>
      <button id="btn-report-icon" class="icon-btn" title="Reportar error" aria-label="Reportar error">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.4"/>
          <path d="M9 5.5v4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <circle cx="9" cy="12.2" r="0.9" fill="currentColor"/>
        </svg>
      </button>
    </header>

    <main class="popup-body">

      <!-- Estado: no estás en Maps -->
      <div class="state-panel empty-state" id="panel-no-maps">
        <div class="empty-icon">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="19" r="12" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <path d="M8 19h24M20 7v24" stroke="currentColor" stroke-width="1.1" stroke-opacity=".35"/>
            <path d="M20 7c4 4 4 20 0 24M20 7c-4 4-4 20 0 24" stroke="currentColor" stroke-width="1.1" stroke-opacity=".35" fill="none"/>
          </svg>
        </div>
        <p class="empty-title">Abrí Google Maps</p>
        <p class="empty-subtitle">Realizá una búsqueda para comenzar a capturar leads.</p>
      </div>

      <!-- Estado principal -->
      <div class="state-panel" id="panel-main">

        <section class="count-block">
          <div class="count-row">
            <span id="lead-count" class="count-number">0</span>
            <span class="count-label">leads</span>
          </div>
          <span id="status-chip" class="chip chip-idle">
            <span class="chip-dot"></span>
            <span id="status-text">Listo</span>
          </span>
        </section>

        <div class="progress-bar-wrap" id="progress-bar-wrap">
          <div class="progress-bar"></div>
        </div>

        <!-- Error -->
        <div id="error-msg" class="error-msg"></div>

        <!-- Sección de opciones -->
        <div class="section">
          <div class="section-label">Opciones</div>
          <label class="toggle-row" for="toggle-email">
            <input type="checkbox" id="toggle-email">
            <span class="toggle-custom" aria-hidden="true"></span>
            <span class="toggle-text">
              <span class="toggle-title">Buscar email en sitio web</span>
              <span class="toggle-hint" id="email-hint">La captura será más lenta.</span>
            </span>
          </label>
        </div>

        <!-- Preview de leads -->
        <div class="section section-results" id="section-results">
          <div class="section-label">
            <span>Resultados</span>
            <span class="section-meta" id="results-meta"></span>
          </div>
          <div id="leads-preview" class="result-list"></div>
        </div>

      </div>
    </main>

    <footer class="popup-footer" id="popup-footer">
      <div class="actions actions-primary">
        <button id="btn-scrape" class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M4.5 7h5M7 4.5v5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          Capturar
        </button>
        <button id="btn-stop" class="btn btn-secondary">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="4" y="4" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.4"/>
          </svg>
          Detener
        </button>
      </div>

      <div class="actions actions-export">
        <button id="btn-export-excel" class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 1.5v7.5M4 6l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 10.5v1A1.5 1.5 0 0 0 3.5 13h7a1.5 1.5 0 0 0 1.5-1.5v-1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          Exportar Excel
        </button>
        <button id="btn-export-csv" class="btn btn-secondary">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 1.5v7.5M4 6l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 10.5v1A1.5 1.5 0 0 0 3.5 13h7a1.5 1.5 0 0 0 1.5-1.5v-1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          CSV
        </button>
      </div>

      <div class="footer-meta">
        <button id="btn-clear" class="btn-link">Limpiar resultados</button>
        <button id="btn-report" class="btn-link btn-link-muted">Reportar error</button>
      </div>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
